services:
  app:
    build: .
    image: rest-route:latest
    container_name: rest-route
    restart: unless-stopped
    ports:
      - "8080:8080"
    # 실제 키는 .env 파일에서 주입 (git 미포함). .env.example 참고
    env_file:
      - .env
    # H2 file DB 영속: 컨테이너 재생성/재배포에도 데이터 유지
    volumes:
      - ./data:/app/data
