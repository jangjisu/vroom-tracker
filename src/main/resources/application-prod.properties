# Production environment settings
# Feign logger level (BASIC: logs only method, URL, status code, time)
spring.cloud.openfeign.client.config.default.loggerLevel=BASIC

# Feign client log level: INFO suppresses DEBUG noise in production
logging.level.com.vroomtracker.client.ExApiClient=INFO

# Inject API key via environment variable: export EX_API_KEY=<real-key>

# Disable H2 console (security)
spring.h2.console.enabled=false

# Production datasource (Docker Compose MySQL by default)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://db:3306/vroom?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:vroom}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Cache-style data (rebuilt from external APIs): auto-add new columns on deploy
spring.jpa.hibernate.ddl-auto=update
