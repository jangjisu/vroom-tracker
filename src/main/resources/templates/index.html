<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vroom-tracker | 지금 많이 가는 곳</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<!-- ===== Page Loader Overlay ===== -->
<div id="pageLoader">
    <div class="page-loader-spinner"></div>
</div>

<!-- ===== Navbar ===== -->
<nav class="navbar navbar-dark bg-dark px-4 py-2">
    <span class="navbar-brand fw-bold">
        <i class="bi bi-speedometer2 me-2"></i>vroom-tracker
    </span>
    <span class="text-secondary small">고속도로 실시간 권역별 교통량</span>
</nav>

<div class="container-fluid px-4 py-4">

    <!-- ===== 권역별 교통량 순위 ===== -->
    <div class="card">
        <div class="card-header">
            <h6 class="mb-0 fw-bold">
                <i class="bi bi-map me-2"></i>권역별 교통량 순위
                <span class="badge bg-secondary ms-1 fw-normal small">1시간 집계 · 출구 교통량 순</span>
            </h6>
        </div>

        <div class="card-body p-0">
            <!-- 로딩 상태 -->
            <div id="regionLoading" class="text-center py-5 text-muted">
                <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                권역 데이터 불러오는 중...
            </div>

            <!-- 오류 상태 -->
            <div id="regionError" class="text-center py-5 text-muted" style="display:none;">
                <i class="bi bi-wifi-off fs-2 d-block mb-2"></i>
                데이터를 불러오지 못했습니다.
            </div>

            <!-- 권역 순위 테이블 -->
            <div id="regionTableWrap" style="display:none;">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th class="text-center" style="width:60px">순위</th>
                        <th>권역</th>
                        <th class="text-end">입구 교통량</th>
                        <th class="text-end">출구 교통량</th>
                        <th style="min-width:120px">출구 현황</th>
                        <th class="text-muted small">집계시간</th>
                    </tr>
                    </thead>
                    <tbody id="regionBody"></tbody>
                </table>
            </div>
        </div>

        <div class="card-footer text-muted small text-end">
            <i class="bi bi-arrow-repeat me-1"></i>
            <span id="countdown">3600</span>초 후 자동 갱신
        </div>
    </div>

</div><!-- /container -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="/js/app.js"></script>
</body>
</html>
