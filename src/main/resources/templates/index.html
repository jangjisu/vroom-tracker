<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vroom-tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-4 py-2">
    <span class="navbar-brand fw-bold">
        <i class="bi bi-speedometer2 me-2"></i>vroom-tracker
    </span>
</nav>

<div class="container-fluid px-4 py-4">
    <section class="rest-stop-map-shell">
        <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-2 mb-3">
            <div>
                <h1 class="h4 mb-1">휴게소 위치 지도</h1>
                <p class="text-secondary mb-0">전국 고속도로 휴게소 위치를 지도에서 확인합니다.</p>
            </div>
            <div class="rest-stop-map-summary">
                <span id="restStopMapStatus">불러오는 중</span>
            </div>
        </div>
        <div id="restStopMap" class="rest-stop-map" aria-label="휴게소 위치 지도"></div>
        <div id="restStopMapError" class="alert alert-warning mt-3 mb-0 d-none" role="alert"></div>
    </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module" src="/js/app.js"></script>
</body>
</html>
