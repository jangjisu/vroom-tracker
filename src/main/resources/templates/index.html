<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vroom-tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-4 py-2">
    <span class="navbar-brand fw-bold">
        <i class="bi bi-speedometer2 me-2"></i>vroom-tracker
    </span>
</nav>

<div class="container-fluid px-4 py-4">
    <section class="rest-stop-map-shell">
        <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-2 mb-3">
            <div>
                <h1 class="h4 mb-1">휴게소 위치 지도</h1>
                <p class="text-secondary mb-0">전국 고속도로 휴게소 위치를 지도에서 확인합니다.</p>
            </div>
            <div class="rest-stop-map-summary">
                <span id="restStopMapStatus">불러오는 중</span>
            </div>
        </div>
        <div class="rest-stop-map-layout">
            <div id="restStopMap" class="rest-stop-map" tabindex="0" aria-label="휴게소 위치 지도"></div>
            <aside id="restStopDetailPanel" class="rest-stop-detail-panel d-none"
                   aria-labelledby="restStopDetailName" aria-busy="false">
                <div class="rest-stop-detail-header">
                    <div>
                        <div class="rest-stop-detail-kicker">선택한 휴게소</div>
                        <h2 id="restStopDetailName" class="rest-stop-detail-name"></h2>
                    </div>
                    <button id="restStopDetailClose" class="btn-close rest-stop-detail-close" type="button"
                            aria-label="상세 정보 닫기"></button>
                </div>
                <div id="restStopDetailStatus" class="rest-stop-detail-status" aria-live="polite"></div>
                <div id="restStopDetailContent" class="rest-stop-detail-content d-none">
                    <section class="rest-stop-detail-section" aria-labelledby="restStopDetailLocationHeading">
                        <h3 id="restStopDetailLocationHeading" class="rest-stop-detail-section-title">위치 정보</h3>
                        <dl class="rest-stop-detail-list">
                            <dt>노선</dt>
                            <dd id="restStopDetailRoute"></dd>
                            <dt>방향</dt>
                            <dd id="restStopDetailDirection"></dd>
                            <dt>주소</dt>
                            <dd id="restStopDetailAddress"></dd>
                        </dl>
                    </section>
                    <section class="rest-stop-detail-section" aria-labelledby="restStopDetailConvenienceHeading">
                        <h3 id="restStopDetailConvenienceHeading" class="rest-stop-detail-section-title">편의시설</h3>
                        <ul id="restStopDetailConvenience" class="rest-stop-detail-tags"></ul>
                        <p id="restStopDetailConvenienceFallback"
                           class="rest-stop-detail-missing d-none"></p>
                    </section>
                    <section class="rest-stop-detail-section" aria-labelledby="restStopDetailOperationHeading">
                        <h3 id="restStopDetailOperationHeading" class="rest-stop-detail-section-title">운영 상태</h3>
                        <dl class="rest-stop-detail-list">
                            <dt>경정비</dt>
                            <dd id="restStopDetailMaintenance"></dd>
                            <dt>화물휴게소</dt>
                            <dd id="restStopDetailFreight"></dd>
                        </dl>
                    </section>
                    <section class="rest-stop-detail-section" aria-labelledby="restStopDetailParkingHeading">
                        <h3 id="restStopDetailParkingHeading" class="rest-stop-detail-section-title">주차 정보</h3>
                        <dl class="rest-stop-detail-list">
                            <dt>소형차</dt>
                            <dd id="restStopDetailCompactParking"></dd>
                            <dt>대형차</dt>
                            <dd id="restStopDetailFullSizeParking"></dd>
                            <dt>장애인</dt>
                            <dd id="restStopDetailDisabledParking"></dd>
                        </dl>
                    </section>
                    <section class="rest-stop-detail-section" aria-labelledby="restStopDetailOilHeading">
                        <div class="rest-stop-detail-section-header">
                            <h3 id="restStopDetailOilHeading" class="rest-stop-detail-section-title">주유 정보</h3>
                            <button id="restStopOilRefreshButton" class="btn btn-sm btn-outline-primary" type="button">
                                실시간 요금 갱신
                            </button>
                        </div>
                        <p id="restStopOilRefreshStatus" class="rest-stop-detail-meta" aria-live="polite"></p>
                        <h4 class="rest-stop-detail-subtitle">요금</h4>
                        <dl class="rest-stop-detail-list">
                            <dt>휘발유</dt>
                            <dd id="restStopOilGasolinePrice"></dd>
                            <dt>경유</dt>
                            <dd id="restStopOilDieselPrice"></dd>
                            <dt>LPG</dt>
                            <dd id="restStopOilLpgPrice"></dd>
                        </dl>
                        <h4 class="rest-stop-detail-subtitle">기본 정보</h4>
                        <dl class="rest-stop-detail-list">
                            <dt>정유사</dt>
                            <dd id="restStopOilCompany"></dd>
                            <dt>전화번호</dt>
                            <dd id="restStopOilTelNo"></dd>
                        </dl>
                        <h4 class="rest-stop-detail-subtitle">주유소 편의시설</h4>
                        <ul id="restStopOilConvenienceTags" class="rest-stop-detail-tags"></ul>
                        <p id="restStopOilConvenienceFallback" class="rest-stop-detail-missing d-none"></p>
                        <ul id="restStopOilConvenienceDetails" class="rest-stop-oil-convenience-details"></ul>
                    </section>
                </div>
            </aside>
        </div>
        <div id="restStopMapError" class="alert alert-warning mt-3 mb-0 d-none" role="alert"></div>
    </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="/js/app.js"></script>
</body>
</html>
