<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>휴게소 음식 관리 | rest-route</title>
    <link href="/css/admin_style.css" rel="stylesheet">
</head>
<body>
<div class="app">
    <aside th:replace="~{fragments/admin-shell :: sidebar(active='foods')}"></aside>
    <main>
        <header th:replace="~{fragments/admin-shell :: header(title='휴게소 음식 관리')}"></header>
        <div class="content">
            <div class="workspace">
                <section class="panel rest-stop-food-panel" aria-labelledby="restStopFoodHeading">
                    <div class="panel-head">
                        <div>
                            <h2 id="restStopFoodHeading">휴게소 음식 관리</h2>
                            <p>동기화된 메뉴를 확인하고, 새 메뉴를 추가하거나 값을 직접 수정합니다.</p>
                        </div>
                    </div>
                    <div class="panel-body">
                        <div class="picker-row">
                            <div class="picker-field">
                                <label class="field-label" for="restStopFoodSelect">휴게소</label>
                                <select id="restStopFoodSelect" class="rest-stop-select" disabled>
                                    <option value="">휴게소를 선택하세요</option>
                                </select>
                            </div>
                        </div>
                        <p id="restStopFoodStatus" class="helper rest-stop-food-status" aria-live="polite"></p>

                        <div class="form-section">
                            <h3 class="form-section-title">새 메뉴 추가</h3>
                            <form id="restStopFoodAddForm" th:data-csrf-header="${_csrf.headerName}">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <div class="field-grid">
                                    <div class="field full">
                                        <label class="field-label" for="restStopFoodAddName">메뉴명</label>
                                        <input id="restStopFoodAddName" type="text" required>
                                    </div>
                                    <div class="field">
                                        <label class="field-label" for="restStopFoodAddCost">가격</label>
                                        <input id="restStopFoodAddCost" type="text">
                                    </div>
                                    <div class="field full">
                                        <label class="field-label" for="restStopFoodAddDescription">설명</label>
                                        <input id="restStopFoodAddDescription" type="text">
                                    </div>
                                </div>
                                <div class="form-actions">
                                    <p class="helper">메뉴를 추가한 뒤 목록에서 이미지를 등록할 수 있습니다.</p>
                                    <div class="form-actions-buttons">
                                        <button id="restStopFoodAddSubmit" class="primary" type="submit">메뉴 추가</button>
                                    </div>
                                </div>
                            </form>
                        </div>

                        <div id="restStopFoodListSection" hidden>
                            <h3 class="form-section-title">현재 메뉴</h3>
                            <p class="form-section-desc">이미지는 등록만 가능하며, 사용자 화면 표시 방식은 별도로 결정합니다.</p>
                            <ul id="restStopFoodList" class="food-list"></ul>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>
</div>
<dialog id="restStopFoodEditModal" class="food-edit-modal" aria-labelledby="restStopFoodEditModalTitle">
    <div class="food-edit-modal-header">
        <h3 id="restStopFoodEditModalTitle">메뉴 수정</h3>
        <button id="restStopFoodEditModalClose" class="btn-close" type="button" aria-label="닫기">
            <i aria-hidden="true">&times;</i>
        </button>
    </div>
    <form id="restStopFoodEditForm" th:data-csrf-header="${_csrf.headerName}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="field-grid">
            <div class="field full">
                <label class="field-label" for="restStopFoodEditName">메뉴명</label>
                <input id="restStopFoodEditName" type="text" required>
            </div>
            <div class="field">
                <label class="field-label" for="restStopFoodEditCost">가격</label>
                <input id="restStopFoodEditCost" type="text">
            </div>
            <div class="field full">
                <label class="field-label" for="restStopFoodEditDescription">설명</label>
                <input id="restStopFoodEditDescription" type="text">
            </div>
        </div>
        <div class="form-actions">
            <p id="restStopFoodEditStateLabel" class="helper"></p>
            <div class="form-actions-buttons">
                <button id="restStopFoodEditClearOverride" class="secondary" type="button" hidden>동기화 해제</button>
                <button id="restStopFoodEditSubmit" class="primary" type="submit">저장</button>
            </div>
        </div>
    </form>
</dialog>
<th:block th:replace="~{fragments/admin-shell :: chrome}"></th:block>
<script type="module" src="/js/admin-rest-food-page.js" defer></script>
</body>
</html>
