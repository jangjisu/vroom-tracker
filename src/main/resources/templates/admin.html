<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 페이지 | rest-route</title>
</head>
<body>
<main>
    <h1>관리자 페이지</h1>
    <section>
        <h2>월별 판매순위 업로드</h2>
        <p th:if="${param.upload != null and param.upload[0] == 'success'}">업로드가 완료되었습니다.</p>
        <form th:action="@{/admin/sales-rankings/products}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label for="productFile">상품 판매순위 CSV</label>
            <input id="productFile" name="productFile" type="file" accept=".csv" required>
            <button type="submit">상품 순위 업로드</button>
        </form>
        <form th:action="@{/admin/sales-rankings/stores}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label for="storeFile">매장 판매순위 CSV</label>
            <input id="storeFile" name="storeFile" type="file" accept=".csv" required>
            <button type="submit">매장 순위 업로드</button>
        </form>
    </section>
    <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit">로그아웃</button>
    </form>
</main>
</body>
</html>
