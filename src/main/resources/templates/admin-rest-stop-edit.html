<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>휴게소 정보 관리 | rest-route</title>
    <link href="/css/admin_style.css" rel="stylesheet">
</head>
<body>
<div class="app">
    <aside th:replace="~{fragments/admin-shell :: sidebar(active='edit')}"></aside>
    <main>
        <header th:replace="~{fragments/admin-shell :: header(title='휴게소 정보 관리')}"></header>
        <div class="content">
            <div class="workspace">
                <section class="panel rest-stop-edit-panel" aria-labelledby="restStopEditHeading">
                    <div class="panel-head">
                        <div>
                            <h2 id="restStopEditHeading">휴게소 정보 관리</h2>
                            <p>도로공사 동기화 데이터를 확인하고, 필요한 항목을 직접 수정합니다.</p>
                        </div>
                    </div>
                    <div class="panel-body">
                        <div class="picker-row">
                            <div class="picker-field">
                                <label class="field-label" for="restStopEditSelect">휴게소</label>
                                <select id="restStopEditSelect" class="rest-stop-select" disabled>
                                    <option value="">휴게소를 선택하세요</option>
                                </select>
                            </div>
                        </div>
                        <p id="restStopEditStatus" class="helper rest-stop-edit-status" aria-live="polite"></p>
                        <div id="restStopEditLockBanner" class="lock-banner" data-state="synced" hidden>
                            <span id="restStopEditLockIcon" class="lock-icon" aria-hidden="true">🔄</span>
                            <div class="lock-banner-body">
                                <div id="restStopEditLockTitle" class="lock-banner-title"></div>
                                <p id="restStopEditLockDesc" class="lock-banner-desc"></p>
                            </div>
                            <div class="lock-banner-action">
                                <button id="restStopEditLockToggle" class="danger" type="button" hidden>잠금 해제</button>
                            </div>
                        </div>
                        <form id="restStopEditForm" hidden th:data-csrf-header="${_csrf.headerName}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <div class="form-section">
                                <h3 class="form-section-title">기본 정보</h3>
                                <p class="form-section-desc">휴게소 위치·노선 정보 (도로공사 위치정보 API 동기화 대상)</p>
                                <div class="field-grid">
                                    <div class="field full">
                                        <label class="field-label" for="restStopEditUnitName">휴게소명</label>
                                        <input id="restStopEditUnitName" type="text">
                                    </div>
                                    <div class="field">
                                        <label class="field-label" for="restStopEditRouteNo">노선번호</label>
                                        <input id="restStopEditRouteNo" type="text">
                                    </div>
                                    <div class="field">
                                        <label class="field-label" for="restStopEditRouteName">노선명</label>
                                        <input id="restStopEditRouteName" type="text">
                                    </div>
                                    <div class="field">
                                        <label class="field-label" for="restStopEditXValue">경도 (X)</label>
                                        <input id="restStopEditXValue" type="text">
                                        <p class="field-hint">지도에 바로 반영되므로 실수 형식만 허용됩니다.</p>
                                    </div>
                                    <div class="field">
                                        <label class="field-label" for="restStopEditYValue">위도 (Y)</label>
                                        <input id="restStopEditYValue" type="text">
                                    </div>
                                    <div class="field">
                                        <span class="field-label">영업부대시설코드</span>
                                        <div id="restStopEditServiceAreaCode" class="field-readonly-value"></div>
                                        <p class="field-hint">다른 테이블과 연결되는 키라 읽기 전용입니다.</p>
                                    </div>
                                    <div class="field">
                                        <span class="field-label">시설코드</span>
                                        <div id="restStopEditUnitCode" class="field-readonly-value"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="form-section">
                                <h3 class="form-section-title">상세 정보</h3>
                                <p class="form-section-desc">편의시설·운영 정보 (도로공사 편의시설 API 동기화 대상)</p>
                                <div class="field-grid">
                                    <div class="field">
                                        <label class="field-label" for="restStopEditTelNo">전화번호</label>
                                        <input id="restStopEditTelNo" type="text">
                                    </div>
                                    <div class="field">
                                        <label class="field-label" for="restStopEditBrand">브랜드</label>
                                        <input id="restStopEditBrand" type="text">
                                    </div>
                                    <div class="field">
                                        <label class="field-label" for="restStopEditRouteCode">노선코드</label>
                                        <input id="restStopEditRouteCode" type="text">
                                    </div>
                                    <div class="field">
                                        <label class="field-label" for="restStopEditConvenience">편의시설</label>
                                        <input id="restStopEditConvenience" type="text">
                                        <p class="field-hint">"|"로 구분해 입력합니다.</p>
                                    </div>
                                    <div class="field full">
                                        <label class="field-label" for="restStopEditSvarAddr">주소</label>
                                        <input id="restStopEditSvarAddr" type="text">
                                    </div>
                                    <div class="field">
                                        <span class="yn-toggle">
                                            <span class="switch">
                                                <input type="checkbox" id="restStopEditMaintenanceYn">
                                                <span class="switch-track" aria-hidden="true"></span>
                                            </span>
                                            <span class="yn-toggle-label">경정비 가능<small>정비 서비스 제공 여부</small></span>
                                        </span>
                                    </div>
                                    <div class="field">
                                        <span class="yn-toggle">
                                            <span class="switch">
                                                <input type="checkbox" id="restStopEditTruckSaYn">
                                                <span class="switch-track" aria-hidden="true"></span>
                                            </span>
                                            <span class="yn-toggle-label">화물휴게소<small>대형 화물차 전용 구역 여부</small></span>
                                        </span>
                                    </div>
                                </div>
                            </div>
                            <div class="form-actions">
                                <p class="helper">저장하면 이 휴게소는 자동 동기화 대상에서 제외됩니다.</p>
                                <div class="form-actions-buttons">
                                    <button id="restStopEditSubmit" class="primary" type="submit">저장</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </section>
            </div>
        </div>
    </main>
</div>
<th:block th:replace="~{fragments/admin-shell :: chrome}"></th:block>
<script type="module" src="/js/admin-rest-stop-edit-page.js" defer></script>
</body>
</html>
