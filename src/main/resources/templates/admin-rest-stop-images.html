<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>휴게소 이미지 관리 | rest-route</title>
    <link href="/css/admin_style.css" rel="stylesheet">
</head>
<body>
<div class="app">
    <aside th:replace="~{fragments/admin-shell :: sidebar(active='images')}"></aside>
    <main>
        <header th:replace="~{fragments/admin-shell :: header(title='휴게소 이미지 관리')}"></header>
        <div class="content">
            <div class="workspace">
                <section class="panel rest-stop-image-panel" aria-labelledby="restStopImageHeading">
                    <div class="panel-head">
                        <div>
                            <h2 id="restStopImageHeading">휴게소 이미지 관리</h2>
                            <p>사용자 상세·경로 화면에 표시할 대표 이미지를 관리합니다.</p>
                        </div>
                        <span class="tag">JPEG · PNG</span>
                    </div>
                    <form id="restStopImageForm" class="rest-stop-image-form" enctype="multipart/form-data"
                          th:data-csrf-header="${_csrf.headerName}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <label class="field-label" for="restStopImageSelect">휴게소</label>
                        <select id="restStopImageSelect" class="rest-stop-select" disabled>
                            <option value="">휴게소를 선택하세요</option>
                        </select>
                        <div id="restStopImagePreviewFrame" class="rest-stop-image-preview" hidden>
                            <img id="restStopImagePreview" alt="">
                        </div>
                        <div id="restStopImageEmpty" class="rest-stop-image-empty" aria-live="polite"></div>
                        <p id="restStopImageStatus" class="helper rest-stop-image-status" aria-live="polite"></p>
                        <label class="field-label" for="restStopImageFile">업로드 이미지</label>
                        <input id="restStopImageFile" class="file-input" name="file" type="file"
                               accept="image/jpeg,image/png" disabled>
                        <p class="helper">20MB 이하 JPEG 또는 PNG를 선택하세요. 저장 시 WebP 상세용·목록용으로 자동 변환됩니다.</p>
                        <div class="rest-stop-image-actions">
                            <button id="restStopImageSubmit" class="primary" type="submit" disabled>이미지 등록</button>
                            <button id="restStopImageDelete" class="danger" type="button" disabled>이미지 삭제</button>
                        </div>
                    </form>
                </section>
            </div>
        </div>
    </main>
</div>
<th:block th:replace="~{fragments/admin-shell :: chrome}"></th:block>
<script type="module" src="/js/admin-rest-stop-images-page.js" defer></script>
</body>
</html>
