spring.application.name=vroom-tracker
spring.profiles.active=local

# data.ex.co.kr API
ex.api.url=https://data.ex.co.kr
# API key: set the real value in application-local.properties (gitignored)
ex.api.key=${EX_API_KEY:YOUR_API_KEY_HERE}

# H2 Database (file-based: data persists across restarts)
spring.datasource.url=jdbc:h2:file:./data/vroom-tracker
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Feign Client global timeout (ms)
spring.cloud.openfeign.client.config.default.connectTimeout=3000
spring.cloud.openfeign.client.config.default.readTimeout=10000

# Suppress Chrome DevTools auto-request 404 noise
logging.level.org.springframework.web.servlet.resource.ResourceHttpRequestHandler=ERROR
