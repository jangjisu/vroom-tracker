spring.application.name=vroom-tracker
spring.profiles.active=local

# data.ex.co.kr API
ex.api.url=https://data.ex.co.kr
# API key - 실제 값은 application-local.properties 에 설정 (gitignore됨)
ex.api.key=${EX_API_KEY:YOUR_API_KEY_HERE}

# H2 Database (파일 기반 - 재시작 시 데이터 유지)
spring.datasource.url=jdbc:h2:file:./data/vroom-tracker
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
